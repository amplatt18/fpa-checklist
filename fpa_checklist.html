<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#378ADD"/>


<title>FP&A Monthly Checklist</title>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#ffffff;--bg2:#f5f5f0;--bg3:#eeede8;
  --t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;
  --b1:rgba(0,0,0,0.11);--b2:rgba(0,0,0,0.20);
  --r1:8px;--r2:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --accent:#378ADD;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#141412;
    --t1:#f0ede8;--t2:#b4b2a9;--t3:#888780;
    --b1:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.17);
  }
}
html,body{height:100%;font-family:var(--font);background:var(--bg3);color:var(--t1);}
body{display:flex;flex-direction:column;}

/* App shell */
.app-header{background:var(--bg1);border-bottom:0.5px solid var(--b1);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50;}
.app-title{font-size:15px;font-weight:500;color:var(--t1);}
.header-nav{display:flex;align-items:center;gap:6px;}
.btn{background:transparent;border:0.5px solid var(--b2);border-radius:var(--r1);padding:5px 12px;cursor:pointer;font-size:13px;color:var(--t2);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-icon{padding:5px 9px;}
.main{flex:1;overflow-y:auto;padding:1rem;}
.inner{max-width:1100px;margin:0 auto;}

/* Month nav */
.month-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.month-label{font-size:18px;font-weight:500;color:var(--t1);}
.month-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r1);padding:10px 12px;}
.stat-label{font-size:10px;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;}
.stat-val{font-size:20px;font-weight:500;color:var(--t1);}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.legend-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);background:var(--bg1);border:0.5px solid var(--b1);border-radius:20px;padding:3px 10px 3px 6px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── CALENDAR VIEW ── */
.drag-hint{font-size:11px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.cal-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:3px;}
.day-hdr{font-size:10px;font-weight:500;color:var(--t3);text-align:center;padding:3px 0;}
.day-cell{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r1);min-height:110px;padding:7px;transition:border-color .1s,background .1s;}
.day-cell.empty{background:transparent;border:none;}
.day-cell.today{border-color:var(--accent);}
.day-cell.drag-over{border-color:#1D9E75;background:rgba(29,158,117,.07);}
.day-num{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:3px;}
.day-cell.today .day-num{color:var(--accent);}
.cal-items{display:flex;flex-direction:column;gap:2px;}
.cal-item{display:flex;align-items:center;gap:4px;font-size:11px;line-height:1.5;border-radius:3px;padding:2px 3px;cursor:grab;user-select:none;}
.cal-item:active{cursor:grabbing;}
.cal-item.dragging{opacity:.3;}
.cal-item .cbar{width:3px;height:14px;border-radius:2px;flex-shrink:0;}
.cal-item .cname{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:160px;color:var(--t2);flex:1;}
.cal-item .ccb{width:11px;height:11px;border-radius:3px;border:0.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-left:auto;}
.cal-item .ccb.on{border-color:#1D9E75;background:#1D9E75;}
.moved-pip{width:5px;height:5px;border-radius:50%;background:#BA7517;flex-shrink:0;}
.prog-wrap{margin-top:3px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:#1D9E75;border-radius:2px;}
.more-lbl{font-size:9px;color:var(--t3);margin-top:2px;}

/* ── LIST VIEW ── */
.list-view{display:flex;flex-direction:column;gap:6px;}
.list-day-group{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);overflow:hidden;}
.list-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--b1);cursor:pointer;user-select:none;}
.list-day-hdr:hover{background:var(--bg2);}
.list-day-title{font-size:14px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:8px;}
.list-day-date{font-size:12px;color:var(--t3);}
.list-day-prog{font-size:12px;color:var(--t3);}
.list-day-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--t3);}
.list-day-badge.done{background:rgba(29,158,117,.12);color:#1D9E75;}
.list-tasks{display:flex;flex-direction:column;}
.list-task{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--b1);cursor:pointer;transition:background .1s;}
.list-task:last-child{border-bottom:none;}
.list-task:hover{background:var(--bg2);}
.list-task.done-task .list-task-name{color:var(--t3);text-decoration:line-through;}
.list-task-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0;}
.list-task-info{flex:1;min-width:0;}
.list-task-name{font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-task-meta{font-size:11px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:8px;}
.list-task-owner{display:inline-flex;align-items:center;gap:3px;}
.list-task-check{width:20px;height:20px;border-radius:5px;border:0.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.list-task-check.on{border-color:#1D9E75;background:#1D9E75;}
.list-moved-badge{font-size:10px;color:#BA7517;background:rgba(186,117,23,.12);border-radius:3px;padding:1px 5px;}
.list-day-collapsed .list-tasks{display:none;}
.list-task{cursor:grab;}
.list-task:active{cursor:grabbing;}
.list-task.dragging{opacity:.3;pointer-events:none;}
.list-day-group.list-drag-over{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.18);}
.list-drag-handle{color:var(--t3);font-size:14px;flex-shrink:0;cursor:grab;padding:0 2px;}

/* Filter bar */
.filter-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.filter-btn{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);}
.filter-btn:hover{background:var(--bg2);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Panel */
.panel{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem;}
.panel-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:0.5px solid var(--b1);}
.ptab{background:none;border:none;border-bottom:2px solid transparent;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--t3);margin-bottom:-0.5px;}
.ptab.active{color:var(--t1);border-bottom-color:var(--accent);font-weight:500;}
.ptab:hover{color:var(--t2);}
.psection{display:none;}
.psection.active{display:block;}
.section-hint{font-size:12px;color:var(--t3);margin-bottom:1rem;}

/* Group cards */
.group-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
.group-card{background:var(--bg2);border:0.5px solid var(--b1);border-radius:var(--r1);padding:9px 12px;display:flex;align-items:center;gap:8px;}
.group-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.group-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
.group-count{font-size:11px;color:var(--t3);}
.group-rm{background:none;border:none;cursor:pointer;color:var(--t3);padding:0;}
.group-rm:hover{color:#e24b4a;}
.color-options{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.color-opt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-opt.selected{border-color:var(--t1);}

/* Task rows in panel */
.ptask-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
.ptask-row{background:var(--bg2);border:0.5px solid var(--b1);border-radius:var(--r1);padding:8px 12px;}
.ptask-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.ptask-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.ptask-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
.ptask-group{font-size:11px;color:var(--t3);margin-right:6px;}
.ptask-owner{font-size:11px;color:var(--t3);}
.ptask-rm{background:none;border:none;cursor:pointer;color:var(--t3);padding:0;}
.ptask-rm:hover{color:#e24b4a;}
.ptask-days-lbl{font-size:11px;color:var(--t3);margin-bottom:5px;}
.day-picker{display:flex;flex-wrap:wrap;gap:3px;}
.dpip{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--b2);background:transparent;cursor:pointer;font-size:10px;color:var(--t2);display:flex;align-items:center;justify-content:center;}
.dpip:hover{background:var(--bg1);}
.dpip.on{color:#fff;border-color:transparent;}

/* Add forms */
.add-form{border-top:0.5px solid var(--b1);padding-top:1rem;margin-top:.5rem;}
.add-form h3{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:10px;}
.form-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.form-row input,.form-row select{font-size:13px;padding:6px 10px;border:0.5px solid var(--b2);border-radius:var(--r1);background:var(--bg3);color:var(--t1);}
.form-row input{flex:1;min-width:140px;}
.form-lbl{font-size:12px;color:var(--t3);margin-bottom:5px;}
.new-dpick{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;}

.saved{font-size:11px;color:var(--t3);text-align:right;padding:8px 0 0;}

/* Unscheduled tasks banner */
.unscheduled-banner{background:var(--bg1);border:0.5px solid rgba(186,117,23,.4);border-radius:var(--r2);padding:12px 16px;margin-bottom:1rem;}
.unscheduled-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--t1);margin-bottom:10px;}
.unscheduled-title i{color:#BA7517;}
.unscheduled-list{display:flex;flex-direction:column;gap:6px;}
.unscheduled-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--r1);}
.unscheduled-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.unscheduled-info{flex:1;min-width:0;}
.unscheduled-name{font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unscheduled-meta{font-size:11px;color:var(--t3);margin-top:1px;}
.unscheduled-assign{font-size:12px;padding:4px 10px;border-radius:var(--r1);border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:#BA7517;white-space:nowrap;}
.unscheduled-assign:hover{background:rgba(186,117,23,.08);}

/* Assign day modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:var(--bg1);border:0.5px solid var(--b1);border-radius:var(--r2);padding:1.5rem;width:90%;max-width:380px;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:15px;font-weight:500;color:var(--t1);margin-bottom:4px;}
.modal-box .modal-sub{font-size:12px;color:var(--t3);margin-bottom:16px;}
.modal-wkday-pick{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.wkd-btn{min-width:52px;padding:6px 8px;border-radius:var(--r1);border:0.5px solid var(--b2);background:transparent;cursor:pointer;font-size:12px;color:var(--t2);text-align:center;}
.wkd-btn:hover{background:var(--bg2);}
.wkd-btn.selected{border-color:#1D9E75;background:rgba(29,158,117,.12);color:#1D9E75;font-weight:500;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-cancel{font-size:13px;padding:7px 14px;border-radius:var(--r1);border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);}
.modal-cancel:hover{background:var(--bg2);}
.modal-confirm{font-size:13px;padding:7px 14px;border-radius:var(--r1);border:0.5px solid #1D9E75;background:#1D9E75;cursor:pointer;color:#fff;}
.modal-confirm:hover{opacity:.9;}
</style>

const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── WORKDAY ENGINE ──
function getFederalHolidays(year) {
  const h = new Set();
  function addDate(d) {
    // Observe: Sat->Fri, Sun->Mon
    const day = d.getDay();
    if (day === 6) d = new Date(d.getFullYear(), d.getMonth(), d.getDate() - 1);
    else if (day === 0) d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
    h.add(d.toISOString().slice(0,10));
  }
  function nthWeekday(y, m, wd, n) {
    let d = new Date(y, m, 1), count = 0;
    while (true) {
      if (d.getDay() === wd) { count++; if (count === n) return d; }
      d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
    }
  }
  function lastWeekday(y, m, wd) {
    let d = new Date(y, m + 1, 0);
    while (d.getDay() !== wd) d = new Date(d.getFullYear(), d.getMonth(), d.getDate() - 1);
    return d;
  }
  // New Year's
  addDate(new Date(year, 0, 1));
  // MLK - 3rd Mon Jan
  h.add(nthWeekday(year, 0, 1, 3).toISOString().slice(0,10));
  // Presidents - 3rd Mon Feb
  h.add(nthWeekday(year, 1, 1, 3).toISOString().slice(0,10));
  // Memorial - last Mon May
  h.add(lastWeekday(year, 4, 1).toISOString().slice(0,10));
  // Juneteenth - Jun 19
  addDate(new Date(year, 5, 19));
  // Independence - Jul 4
  addDate(new Date(year, 6, 4));
  // Labor - 1st Mon Sep
  h.add(nthWeekday(year, 8, 1, 1).toISOString().slice(0,10));
  // Columbus - 2nd Mon Oct
  h.add(nthWeekday(year, 9, 1, 2).toISOString().slice(0,10));
  // Veterans - Nov 11
  addDate(new Date(year, 10, 11));
  // Thanksgiving - 4th Thu Nov
  h.add(nthWeekday(year, 10, 4, 4).toISOString().slice(0,10));
  // Christmas - Dec 25
  addDate(new Date(year, 11, 25));
  return h;
}

// Cache holidays per year
const _holidayCache = {};
function getHolidays(year) {
  if (!_holidayCache[year]) _holidayCache[year] = getFederalHolidays(year);
  return _holidayCache[year];
}

function isWorkday(year, month, day) {
  const d = new Date(year, month, day);
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  return !getHolidays(year).has(d.toISOString().slice(0,10));
}

// Returns the calendar day number for the nth workday of year/month
// Returns null if month has fewer workdays
function workdayToCalDay(year, month, n) {
  const daysInMon = new Date(year, month + 1, 0).getDate();
  let count = 0;
  for (let d = 1; d <= daysInMon; d++) {
    if (isWorkday(year, month, d)) {
      count++;
      if (count === n) return d;
    }
  }
  return null;
}

// Returns the nth workday number for a given calendar day (or null if it's not a workday)
function calDayToWorkday(year, month, calDay) {
  if (!isWorkday(year, month, calDay)) return null;
  let count = 0;
  for (let d = 1; d <= calDay; d++) {
    if (isWorkday(year, month, d)) count++;
  }
  return count;
}

// Resolve weekPattern tasks to actual days for this month/year
function resolveWeekPattern(task){
  const p=task.weekPattern;
  if(!p)return task.days;
  const days=[];
  const totalDays=dim();
  const year=S.year,month=S.month;
  if(p==='every-mon'||p==='every-mon-seasonal'){
    for(let d=1;d<=totalDays;d++){
      if(new Date(year,month,d).getDay()===1)days.push(d);
    }
  } else if(p==='alt-tue'){
    let count=0;
    for(let d=1;d<=totalDays;d++){
      if(new Date(year,month,d).getDay()===2){count++;if(count%2===1)days.push(d);}
    }
  } else if(p==='1st-3rd-wed'){
    let count=0;
    for(let d=1;d<=totalDays;d++){
      if(new Date(year,month,d).getDay()===3){count++;if(count===1||count===3)days.push(d);}
    }
  }
  return days;
}

function effectiveDays(task){
  if (task.weekPattern) return resolveWeekPattern(task);
  // task.days are workday numbers — convert to calendar days for current month
  return task.days.map(wd => workdayToCalDay(S.year, S.month, wd)).filter(d => d !== null);
}

function effectiveDay(taskId,baseDay){
  const mo=S.overrides[mKey()];
  if(mo&&mo[`${taskId}_${baseDay}`]!==undefined)return mo[`${taskId}_${baseDay}`];
  return baseDay;
}

function tasksForDay(day){
  const result=[];
  S.tasks.forEach(task=>{
    if(filterOwner!=='all'&&task.owner!==filterOwner)return;
    if(filterGroup!=='all'&&task.groupId!==parseInt(filterGroup))return;
    const baseDays=effectiveDays(task);
    baseDays.forEach(baseDay=>{
      if(effectiveDay(task.id,baseDay)===day){
        result.push({task,baseDay,isOverridden:effectiveDay(task.id,baseDay)!==baseDay});
      }
    });
  });
  return result;
}

function isChecked(day,taskId,baseDay){
  return !!(S.checks[cKey(day)]||{})[`${taskId}_${baseDay}`];
}

function toggleCheck(day,taskId,baseDay){
  const k=cKey(day);
  if(!S.checks[k])S.checks[k]={};
  const newVal=!S.checks[k][`${taskId}_${baseDay}`];
  S.checks[k][`${taskId}_${baseDay}`]=newVal;
  saveCheck(S.year,S.month,day,taskId,baseDay,newVal);
  save();render();
}

function applyOverride(taskId,baseDay,toDay){
  if(!S.overrides[mKey()])S.overrides[mKey()]={};
  if(toDay===baseDay){
    delete S.overrides[mKey()][`${taskId}_${baseDay}`];
    saveOverride(S.year,S.month,taskId,baseDay,null);
  } else {
    S.overrides[mKey()][`${taskId}_${baseDay}`]=toDay;
    saveOverride(S.year,S.month,taskId,baseDay,toDay);
  }
  save();render();
}

function monthStats(){
  const days=dim();
  let total=0,possible=0,perfectDays=0;
  for(let d=1;d<=days;d++){
    const items=tasksForDay(d);
    if(!items.length)continue;
    const done=items.filter(({task,baseDay})=>isChecked(d,task.id,baseDay)).length;
    total+=done;possible+=items.length;
    if(done===items.length)perfectDays++;
  }
  const daysWithTasks=[...new Set(Array.from({length:days},(_,i)=>i+1).filter(d=>tasksForDay(d).length>0))].length;
  return{total,possible,perfectDays,pct:possible>0?Math.round(total/possible*100):0,daysWithTasks};
}

function getUnscheduledTasks(){
  // Tasks whose workday falls outside this month's workday count
  const results=[];
  S.tasks.forEach(task=>{
    if(task.weekPattern)return; // week-pattern tasks handle themselves
    task.days.forEach(wd=>{
      const calDay=workdayToCalDay(S.year,S.month,wd);
      if(calDay===null){
        // Check if there's already a month override for this
        const mo=S.overrides[mKey()];
        const hasOverride=mo&&mo[`${task.id}_${wd}`]!==undefined;
        if(!hasOverride)results.push({task,workday:wd});
      }
    });
  });
  // Apply filters
  return results.filter(({task})=>{
    if(filterOwner!=='all'&&task.owner!==filterOwner)return false;
    if(filterGroup!=='all'&&task.groupId!==parseInt(filterGroup))return false;
    return true;
  });
}

    const el=document.getElementById('nt-group');
    return el&&g.id===parseInt(el.value);
  })||S.groups[0]).color:'#888';

  const taskListHtml=S.tasks.length===0
    ?'<div style="font-size:13px;color:var(--t3)">No tasks yet.</div>'
    :S.tasks.map(t=>{
      const col=groupColor(t.groupId);
      const baseDays=t.weekPattern?['Pattern: '+t.weekPattern]:t.days;
      const dayLabel=t.weekPattern?`Pattern: ${t.weekPattern}`:t.days.length>0?`Workday ${t.days.join(', ')}`:'No days';
      const pips=t.weekPattern?'<span style="font-size:11px;color:var(--t3)">Week-based pattern — edit not applicable here</span>':
        Array.from({length:31},(_,i)=>i+1).map(d=>{
          const on=t.days.includes(d);
          return `<button class="dpip${on?' on':''}" style="${on?'background:'+col+';':''}" onclick="toggleTaskDay(${t.id},${d})">${d}</button>`;
        }).join('');
      return `<div class="ptask-row">
        <div class="ptask-top">
          <div class="ptask-bar" style="background:${col}"></div>
          <span class="ptask-name">${t.name}</span>
          <span class="ptask-group">${groupName(t.groupId)}</span>
          <span class="ptask-owner">${t.owner}</span>
          <button class="ptask-rm" onclick="removeTask(${t.id})"><i class="ti ti-trash" style="font-size:12px"></i></button>
        </div>
        <div class="ptask-days-lbl">${dayLabel}</div>
        <div class="day-picker">${pips}</div>
      </div>`;
    }).join('');

  const newDayPips=Array.from({length:31},(_,i)=>i+1).map(d=>{
    const on=newTaskDays.includes(d);
    return `<button class="dpip${on?' on':''}" style="${on?'background:'+newColor+';':''}" onclick="toggleNewDay(${d})">${d}</button>`;
  }).join('');

  const panelHtml=showPanel?`<div class="panel">
    <div class="panel-tabs">
      <button class="ptab${activeTab==='tasks'?' active':''}" onclick="switchTab('tasks')">Tasks</button>
      <button class="ptab${activeTab==='groups'?' active':''}" onclick="switchTab('groups')">Groups</button>
    </div>
    <div class="psection${activeTab==='groups'?' active':''}">
      <p class="section-hint">Groups share a color. All tasks in a group show that color on the calendar and list.</p>
      <div class="group-list">${groupListHtml||'<div style="font-size:13px;color:var(--t3)">No groups.</div>'}</div>
      <div class="add-form">
        <h3>Add group</h3>
        <div class="form-row"><input type="text" id="ng-name" placeholder="Group name…" maxlength="40"/></div>
        <div class="form-lbl">Color</div>
        <div class="color-options">${colorOpts}</div>
        <button class="btn" onclick="addGroup()"><i class="ti ti-plus"></i> Add group</button>
      </div>
    </div>
    <div class="psection${activeTab==='tasks'?' active':''}">
      <p class="section-hint">Tasks are scheduled by workday number (skipping weekends &amp; US federal holidays). Drag on the calendar or list to reschedule for one month only.</p>
      <div class="ptask-list">${taskListHtml}</div>
      <div class="add-form">
        <h3>Add task</h3>
        <div class="form-row">
          <input type="text" id="nt-name" placeholder="Task name…" maxlength="80"/>
        </div>
        <div class="form-row">
          <select id="nt-group" onchange="render()">${groupOpts}</select>
          <select id="nt-owner">${ownerOpts}</select>
        </div>
        <div class="form-lbl">Workdays this task repeats (workday 1 = first business day of month):</div>
        <div class="new-dpick">${newDayPips}</div>
        <button class="btn" onclick="addTask()"><i class="ti ti-plus"></i> Add task</button>
      </div>
    </div>
  </div>`:'';

  // Unscheduled banner
  const unscheduled=getUnscheduledTasks();
  const unscheduledHtml=unscheduled.length>0?`<div class="unscheduled-banner">
    <div class="unscheduled-title"><i class="ti ti-alert-triangle"></i>${unscheduled.length} task${unscheduled.length>1?'s':''} not scheduled this month — workday falls outside month length</div>
    <div class="unscheduled-list">
      ${unscheduled.map(({task,workday})=>`<div class="unscheduled-row">
        <div class="unscheduled-bar" style="background:${groupColor(task.groupId)}"></div>
        <div class="unscheduled-info">
          <div class="unscheduled-name">${task.name}</div>
          <div class="unscheduled-meta">${task.owner} · ${groupName(task.groupId)} · Workday ${workday}</div>
        </div>
        <button class="unscheduled-assign" onclick="openAssignModal(${task.id},${workday})"><i class="ti ti-calendar-plus" style="font-size:12px"></i> Assign day</button>
      </div>`).join('')}
    </div>
  </div>`:'';

  // Assign modal
  let assignModalHtml='';
  if(assignModal){
    const task=S.tasks.find(t=>t.id===assignModal.taskId);
    const col=task?groupColor(task.groupId):'#888';
    const totalDays=dim();
    // Build workday-only day buttons for this month
    const dayBtns=[];
    for(let d=1;d<=totalDays;d++){
      if(!isWorkday(S.year,S.month,d))continue;
      const wd=calDayToWorkday(S.year,S.month,d);
      const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(S.year,S.month,d).getDay()];
      const sel=assignModal.selectedCalDay===d;
      dayBtns.push(`<button class="wkd-btn${sel?' selected':''}" onclick="selectAssignDay(${d})">${dow} ${d}${wd?' (WD'+wd+')':''}</button>`);
    }
    assignModalHtml=`<div class="modal-backdrop" onclick="if(event.target===this)closeAssignModal()">
      <div class="modal-box">
        <h3>Assign a day for this month</h3>
        <p class="modal-sub"><strong>${task?task.name:'Task'}</strong> is normally workday ${assignModal.workday} but this month doesn't have that many workdays. Pick a workday to assign it to for ${MONTHS[S.month]} only.</p>
        <div class="modal-wkday-pick">${dayBtns.join('')}</div>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="closeAssignModal()">Cancel</button>
          <button class="modal-confirm" onclick="confirmAssign()" ${!assignModal.selectedCalDay?'disabled style="opacity:.5;cursor:default"':''}>Confirm</button>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML=`
    ${assignModalHtml}
    ${panelHtml}
    <div class="month-bar">
      <div class="nav-row" style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-icon" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
        <span class="month-label">${MONTHS[S.month]} ${S.year}</span>
        <button class="btn btn-icon" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    ${statsHtml}
    <div class="legend">${legendHtml}</div>
    <div class="filter-bar">${ownerBtns}${groupBtns}</div>
    ${unscheduledHtml}
    ${viewHtml}
  `;

  document.querySelectorAll('.cal-item').forEach(el=>{
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragend',onDragEnd);
  });
  document.querySelectorAll('.list-task').forEach(el=>{
    el.addEventListener('dragstart',listDragStart);
    el.addEventListener('dragend',listDragEnd);
  });
}

// ── LIST DRAG ──
function listDragStart(e){
  dragTaskId=parseInt(e.currentTarget.dataset.tid);
  dragFromDay=parseInt(e.currentTarget.dataset.fday);
  dragBaseDay=parseInt(e.currentTarget.dataset.bday);
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','listdrag');
  setTimeout(()=>e.currentTarget.classList.add('dragging'),0);
}
function listDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.list-day-group').forEach(g=>g.classList.remove('list-drag-over'));
  dragTaskId=null;dragFromDay=null;dragBaseDay=null;
}
function listDragOver(e,toDay){
  e.preventDefault();
  document.querySelectorAll('.list-day-group').forEach(g=>g.classList.remove('list-drag-over'));
  if(toDay!==dragFromDay)e.currentTarget.classList.add('list-drag-over');
  e.dataTransfer.dropEffect='move';
}
function listDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget))
    e.currentTarget.classList.remove('list-drag-over');
}
function listDrop(e,toDay){
  e.preventDefault();
  document.querySelectorAll('.list-day-group').forEach(g=>g.classList.remove('list-drag-over'));
  if(!dragTaskId||toDay===dragFromDay)return;
  if(toDay<1||toDay>dim())return;
  applyOverride(dragTaskId,dragBaseDay,toDay);
}

// Expose globals
['prevMonth','nextMonth','setView','togglePanel','switchTab','openAssignModal','closeAssignModal','selectAssignDay','confirmAssign',
 'setFilterOwner','setFilterGroup','toggleCheck','toggleTaskDay',
 'toggleNewDay','addTask','addGroup','removeTask','removeGroup',
 'selectGroupColor','onDragOver','onDragLeave','onDrop','toggleDayCollapse',
 'listDragOver','listDragLeave','listDrop'
].forEach(fn=>window[fn]=eval(fn));

window.addEventListener('load', ()=>{ render(); initDB(); });
</script>
</body>
